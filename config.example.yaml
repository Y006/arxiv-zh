llm:
  sdk: deepseek
  models: deepseek-v4-flash
  endpoint: https://api.deepseek.com
  key: null
  key_env: DEEPSEEK_API_KEY
  temperature: 0.1
  max_tokens: 65536

translation:
  concurrency: 3
  max_chunks: null
  quality_mode: standard
  examples_path: null
  batch_short_threshold: 1500
  batch_max_chars: 24000
  custom_system_prompt: null
  custom_user_prompt: null
  preserve_terms: []

paths:
  output_dir: ./output
  cache_dir: .cache

fonts:
  dir: ./fonts
  auto_detect: true
  main: null
  sans: null
  mono: null

compilation:
  enabled: true
  engine: xelatex
  timeout: 600
  clean_aux: true
  prefer_latexmk: true
  engine_policy: auto
  fallback_engines:
    - xelatex
    - lualatex
  allow_pdflatex_cjk: false
  allow_shell_escape: false
  max_repair_rounds: 3
  chinese_package: auto
  use_tinytex: true
  tinytex_driver: r_tinytex
  tinytex_paths:
    - ~/Library/TinyTeX/bin/universal-darwin
    - ~/.TinyTeX/bin/*
    - ~/TinyTeX/bin/*
    - /Library/TinyTeX/bin/universal-darwin
    - /Library/TeX/texbin
  install_missing_packages: true
  total_timeout: 7200

parser:
  extra_protected_environments: []
  extra_translatable_environments: []

cache:
  enabled: true
  max_size_mb: 2048
  ttl_days: 30
  compression: zstd
  key_mode: relaxed_chunk
