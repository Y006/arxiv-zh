llm:
  sdk: deepseek
  models: deepseek-chat
  endpoint: https://api.deepseek.com
  key: null
  key_env: DEEPSEEK_API_KEY
  temperature: 0.1
  max_tokens: 4000

compilation:
  enabled: false
  engine: xelatex
  timeout: 120
  clean_aux: true
  engine_policy: auto
  fallback_engines:
    - xelatex
    - lualatex
  allow_pdflatex_cjk: false
  allow_shell_escape: false
  max_repair_rounds: 3
  chinese_package: auto

paths:
  output_dir: output
  cache_dir: .cache

cache:
  enabled: true
  max_size_mb: 2048
  ttl_days: 30
  compression: zstd
  key_mode: relaxed_chunk

fonts:
  auto_detect: true
  main: null
  sans: null
  mono: null
  dir: fonts

translation:
  custom_system_prompt: null
  custom_user_prompt: null
  preserve_terms: []
  quality_mode: standard
  examples_path: null
  batch_short_threshold: 300
  batch_max_chars: 2000
  concurrency: 3
  max_chunks: null

parser:
  extra_protected_environments: []
  extra_translatable_environments: []
